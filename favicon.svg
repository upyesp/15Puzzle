<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Single tile matching the puzzle's dark theme -->
  <rect x="4" y="4" width="56" height="56" rx="10" fill="#252836"/>

  <!-- Subtle border to match tile styling -->
  <rect x="4" y="4" width="56" height="56" rx="10" fill="none" stroke="#2a2d3a" stroke-width="1.5"/>

  <!-- "15" number in puzzle text color -->
  <text x="32" y="32" text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI', system-ui, sans-serif" font-weight="700"
        font-size="28" fill="#e8ebf5">15</text>
</svg>
