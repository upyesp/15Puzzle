<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <title>15 Puzzle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e6ed;
      --muted: #8b8fa3;
      --accent: #6c8cff;
      --tile-bg: #252836;
      --tile-hover: #2f3347;
      --tile-number: #e8ebf5;
      --win-gold: #ffd166;
      --gap: 6px;
      --radius: 10px;
      /* Slide animation. Want it slower/sooner? Tweak these two. */
      --slide-duration: 0.35s;
      --slide-easing: cubic-bezier(0.22, 1, 0.36, 1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      width: min(100%, 380px);
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }

    .stat-value.gold {
      color: var(--win-gold);
    }

    /* Board */
    .board-wrapper {
      position: relative;
      width: min(85vw, 380px);
      aspect-ratio: 1 / 1;
      margin-bottom: 24px;
    }

    .board {
      position: relative;
      width: 100%;
      height: 100%;
      padding: var(--gap);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
    }

    /*
      Persistent tile elements (one per number) positioned absolutely.
      The outer .tile-slot owns the position + slide transition (transform: translate).
      The inner .tile owns the press/hover feedback (transform: scale).
      Keeping them separate means the two transforms never fight each other.
    */
    .tile-slot {
      position: absolute;
      left: 0;
      top: 0;
      transition: transform var(--slide-duration) var(--slide-easing);
      will-change: transform;
    }

    .tile-slot.no-anim {
      transition: none;
    }

    .tile {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-weight: 700;
      border-radius: var(--radius);
      background: var(--tile-bg);
      color: var(--tile-number);
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
      border: 1px solid transparent;
      -webkit-tap-highlight-color: transparent;
      /* Ensures taps register reliably and disables the ~300ms double-tap-zoom delay. */
      touch-action: manipulation;
    }

    .tile:hover {
      background: var(--tile-hover);
      transform: scale(1.03);
    }

    .tile:active {
      transform: scale(0.95);
    }

    /* Win overlay */
    .win-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 17, 23, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: calc(var(--radius) + 4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      z-index: 10;
    }

    .win-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .win-icon {
      font-size: 3rem;
      margin-bottom: 8px;
    }

    .win-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--win-gold);
    }

    .win-sub {
      color: var(--muted);
      margin-top: 4px;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      width: min(100%, 380px);
    }

    button {
      flex: 1;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.15); }

    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { background: var(--tile-hover); }

    /* Personal best animation */
    @keyframes pulse-gold {
      0%   { box-shadow: 0 0 0 0 rgba(255, 209, 102, 0.4); }
      70%  { box-shadow: 0 0 0 12px rgba(255, 209, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 209, 102, 0); }
    }

    .stat-value.new-best {
      animation: pulse-gold 1s ease-out;
      color: var(--win-gold) !important;
    }
  </style>
</head>
<body>
  <h1>15 Puzzle</h1>
  <p class="subtitle">Slide tiles to order them 1–15</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best Moves</div>
      <div class="stat-value gold" id="best">—</div>
    </div>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
    <div class="win-overlay" id="overlay">
      <div class="win-icon">&#x1F3C6;</div>
      <div class="win-text">Solved!</div>
      <div class="win-sub" id="win-info"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="newGame()">New Game</button>
    <button class="btn-secondary" onclick="resetBest()">Reset Best</button>
  </div>

  <script>
    (() => {
      const SIZE = 4;
      const TOTAL = SIZE * SIZE;

      // --- State ---
      let tiles = [];        // flat array, 0 = empty; tiles[i] = number at position i
      let moves = 0;
      let won = false;

      const boardEl   = document.getElementById('board');
      const movesEl   = document.getElementById('moves');
      const bestEl    = document.getElementById('best');
      const overlayEl = document.getElementById('overlay');
      const winInfoEl = document.getElementById('win-info');

      // Persistent tile elements keyed by number (1..15). Never recreated during play.
      const slotByNumber = {};

      // --- Persistence ---
      function getBest() {
        return JSON.parse(localStorage.getItem('puzzle15-best') || 'null');
      }

      function setBest(moveCount) {
        localStorage.setItem('puzzle15-best', JSON.stringify({ moves: moveCount }));
      }

      function renderBest() {
        const b = getBest();
        bestEl.textContent = b ? `${b.moves}` : '—';
      }

      // --- Geometry ---
      // Tiles are absolutely positioned. We measure the board and compute each
      // tile's translate() from its grid index, so layout stays responsive.
      function getMetrics() {
        const styles = getComputedStyle(boardEl);
        const gap = parseFloat(styles.getPropertyValue('--gap')) || 6;
        const padding = gap;                              // board padding == --gap
        const clientW = boardEl.clientWidth;              // includes padding, excludes border
        const contentW = clientW - 2 * padding;
        const cell = (contentW - (SIZE - 1) * gap) / SIZE;
        return { gap, padding, cell };
      }

      function cellToXY(index) {
        const { gap, padding, cell } = getMetrics();
        const row = Math.floor(index / SIZE);
        const col = index % SIZE;
        return {
          x: padding + col * (cell + gap),
          y: padding + row * (cell + gap),
          cell
        };
      }

      function positionTile(number, animate) {
        const slot = slotByNumber[number];
        if (!slot) return;
        const idx = tiles.indexOf(number);
        const { x, y, cell } = cellToXY(idx);

        if (!animate) {
          // Disable transition, apply, force a reflow, then re-enable so the
          // jump is instantaneous (used on new game / resize) while real moves slide.
          slot.classList.add('no-anim');
        }

        slot.style.width = cell + 'px';
        slot.style.height = cell + 'px';
        slot.style.transform = `translate(${x}px, ${y}px)`;

        if (!animate) {
          void slot.offsetWidth;             // flush layout
          slot.classList.remove('no-anim');
        }
      }

      function layoutAll(animate) {
        for (let n = 1; n < TOTAL; n++) positionTile(n, animate);
      }

      // --- Board build (once) ---
      function buildBoard() {
        boardEl.innerHTML = '';
        for (let n = 1; n < TOTAL; n++) {
          const slot = document.createElement('div');
          slot.className = 'tile-slot';

          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.textContent = n;
          // A single, unified input handler. No touchend/click duplication, and
          // touch-action: manipulation on the tile makes the tap register reliably.
          tile.addEventListener('click', () => handleClick(n));

          slot.appendChild(tile);
          boardEl.appendChild(slot);
          slotByNumber[n] = slot;
        }
      }

      function handleClick(number) {
        if (won) return;
        const idx = tiles.indexOf(number);
        const emptyIdx = tiles.indexOf(0);
        if (!isAdjacent(idx, emptyIdx)) return;

        // Swap in the model, then animate just the one tile that moved.
        [tiles[idx], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[idx]];
        moves++;
        movesEl.textContent = moves;

        positionTile(number, true);

        if (checkWin()) handleWin();
      }

      function isAdjacent(a, b) {
        const rowA = Math.floor(a / SIZE), colA = a % SIZE;
        const rowB = Math.floor(b / SIZE), colB = b % SIZE;
        return (Math.abs(rowA - rowB) + Math.abs(colA - colB)) === 1;
      }

      // --- Win check ---
      function checkWin() {
        for (let i = 0; i < TOTAL - 1; i++) {
          if (tiles[i] !== i + 1) return false;
        }
        return true;
      }

      function handleWin() {
        won = true;
        winInfoEl.textContent = `${moves} moves`;

        let isNewBest = false;
        const prev = getBest();
        if (!prev || moves < prev.moves) {
          setBest(moves);
          isNewBest = true;
        }
        renderBest();
        if (isNewBest) {
          bestEl.classList.add('new-best');
          setTimeout(() => bestEl.classList.remove('new-best'), 1200);
        }

        // Let the final tile slide home before the overlay fades in.
        setTimeout(() => overlayEl.classList.add('show'), 260);
      }

      // --- Shuffling ---
      function getNeighbors(idx) {
        const row = Math.floor(idx / SIZE);
        const col = idx % SIZE;
        const n = [];
        if (row > 0) n.push(idx - SIZE);
        if (row < SIZE - 1) n.push(idx + SIZE);
        if (col > 0) n.push(idx - 1);
        if (col < SIZE - 1) n.push(idx + 1);
        return n;
      }

      function shuffle() {
        // Start solved, then perform random valid moves to guarantee solvability.
        tiles = [];
        for (let i = 1; i < TOTAL; i++) tiles.push(i);
        tiles.push(0);

        let emptyIdx = TOTAL - 1;
        let lastDir = -1;

        // More moves for a better shuffle on mobile
        const numMoves = isMobile() ? 200 : 150;

        for (let i = 0; i < numMoves; i++) {
          const neighbors = getNeighbors(emptyIdx);
          const filtered = neighbors.filter(n => n !== lastDir);
          const pick = filtered[Math.floor(Math.random() * filtered.length)];
          [tiles[emptyIdx], tiles[pick]] = [tiles[pick], tiles[emptyIdx]];
          lastDir = emptyIdx;
          emptyIdx = pick;
        }

        // Second pass: also avoid undoing the last move to ensure good mixing
        for (let i = 0; i < numMoves / 2; i++) {
          const neighbors = getNeighbors(emptyIdx);
          const filtered = neighbors.filter(n => n !== lastDir);
          const pick = filtered[Math.floor(Math.random() * filtered.length)];
          [tiles[emptyIdx], tiles[pick]] = [tiles[pick], tiles[emptyIdx]];
          lastDir = emptyIdx;
          emptyIdx = pick;
        }
      }

      function isMobile() {
        return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      }

      // --- Resize: keep tiles aligned without animating the reflow ---
      let resizeRaf = null;
      function onResize() {
        if (resizeRaf) cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(() => layoutAll(false));
      }

      // --- New game ---
      window.newGame = function () {
        won = false;
        moves = 0;
        movesEl.textContent = '0';
        overlayEl.classList.remove('show');
        shuffle();
        layoutAll(false);
      };

      window.resetBest = function () {
        localStorage.removeItem('puzzle15-best');
        renderBest();
      };

      // --- Init ---
      buildBoard();
      renderBest();
      newGame();
      window.addEventListener('resize', onResize);
    })();
  </script>
</body>
</html>
